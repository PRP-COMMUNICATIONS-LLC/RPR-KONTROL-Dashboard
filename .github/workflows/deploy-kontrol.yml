name: RPR-KONTROL DEPLOY (GOVERNANCE TOWER)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write # MANDATORY for WIF v2 Handshake

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Substrate
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node (LTS Alignment)
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Locked to Firebase-supported LTS

      - name: 📦 Reconcile Dependencies
        run: npm ci

      - name: 🛡️ Authenticate to GCP (WIF v2)
        uses: google-github-actions/auth@v2
        with:
          # Authority: RPR-K-TECH-061 / WIF Provider v2
          # Registry: projects/796960601918 (rpr-myaudit)
          workload_identity_provider: 'projects/796960601918/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider-v2'
          service_account: 'github-actions-deployer@rpr-myaudit.iam.gserviceaccount.com'

      - name: 🏗️ Execute Governance Build
        run: npm run build:kontrol

      - name: 🔥 Deploy to Firebase (Harbor Lock)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RPR_MYAUDIT }}'
          projectId: rpr-myaudit
          target: kontrol
        env:
          FIREBASE_CLI_PREV: 1