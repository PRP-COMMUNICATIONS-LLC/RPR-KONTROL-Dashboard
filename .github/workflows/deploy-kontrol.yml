name: "🛡️ Sovereign Deploy: Step 01"
on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "🛰️ Checkout Substrate"
        uses: actions/checkout@v4

      - name: "🛰️ Authenticate via OIDC"
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/796960601918/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider-v2'
          service_account: 'github-actions-deployer@rpr-myaudit.iam.gserviceaccount.com'

      - name: "🏗️ Authoritative Build"
        run: |
          npm ci
          npm run build:kontrol

      - name: "🚀 Sovereign Push (Direct CLI Injection)"
        run: |
          # Injecting OIDC credentials into Firebase CLI via ADC
          npx firebase-tools deploy --only hosting:kontrol --project rpr-myaudit
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}