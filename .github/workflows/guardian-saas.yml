# [LEGACY] - Deprecated by RPR-K-TECH-061 v1.8.0. DO NOT EXECUTE.
name: Guardian Deployment & Verification

on:
  push:
    branches: [ legacy-ignore ]

permissions:
  contents: read
  id-token: write  # Required for WIF/OIDC handshake

jobs:
  build_and_deploy_kontrol:
    name: "🛡️ Sovereign Deploy: Kontrol"
    runs-on: ubuntu-latest

    steps:
      - name: "🛰️ Checkout"
        uses: actions/checkout@v4

      - name: "📦 Setup Node (v20)"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: "🛠️ Install Dependencies"
        run: npm ci

      - name: "🏗️ Build Kontrol"
        env:
          VITE_FIREBASE_PROJECT_ID: rpr-myaudit
        run: npm run build:kontrol

      - name: "🔐 Authenticate via WIF"
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'   # <<< Token Bridge

      - name: "🚀 Firebase Deploy (Direct CLI)"
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}   # <<< Token Bridge
        run: |
          npx firebase-tools deploy \
            --only hosting:kontrol \
            --project rpr-myaudit \
            --non-interactive